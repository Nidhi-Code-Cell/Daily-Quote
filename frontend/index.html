<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Illuminate - Daily Inspiration</title>
  <link rel="stylesheet" href="./index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="app-name">
      <i class="fa-solid fa-lightbulb"></i>
      Illuminate
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="gallery-btn" title="My Gallery">
        <i class="fa-solid fa-book"></i>
        <span class="gallery-count" id="gallery-count">0</span>
      </button>
      <button class="icon-btn" title="Notification time">
        <i class="fa-regular fa-clock"></i>
        <span class="time-indicator" id="current-time">Not set</span>
      </button>
      <button class="icon-btn" id="notify-btn" title="Enable notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="notification-status" id="notification-status">Off</span>
      </button>
    </div>
  </header>

  <!-- Main Quote Area -->
  <main class="main">
    <div class="quote-container">
      <div class="quote-box" id="quote-box">
        <div class="quote-text" id="quote-text">Loading your daily inspiration...</div>
        <div class="quote-author" id="quote-author"></div>
        <div class="quote-actions">
          <button class="action-btn" id="save-quote" title="Save quote">
            <i class="fa-regular fa-bookmark"></i>
            <span>Save</span>
          </button>
          <button class="action-btn" id="share-quote" title="Share quote">
            <i class="fa-regular fa-share"></i>
            <span>Share</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Gallery Modal -->
  <div id="gallery-modal" class="modal">
    <div class="modal-content gallery-modal-content">
      <h3><i class="fa-solid fa-book"></i> My Quote Gallery</h3>
      <div class="gallery-container" id="gallery-container">
        <div class="empty-gallery" id="empty-gallery">
          <i class="fa-solid fa-book-open"></i>
          <p>Your gallery is empty</p>
          <p>Save quotes to build your collection!</p>
        </div>
      </div>
      <div class="modal-buttons">
        <button id="close-gallery" class="btn btn-secondary"><i class="fa-solid fa-times"></i> Close</button>
      </div>
    </div>
  </div>

  <!-- Time Picker Modal -->
  <div id="time-modal" class="modal">
    <div class="modal-content">
      <h3><i class="fa-regular fa-clock"></i> Set Notification Time</h3>
      <input type="time" id="notification-time" class="time-input">
      <div class="time-display" id="time-display">Select time above</div>
      <div class="modal-buttons">
        <button id="save-time" class="btn btn-primary"><i class="fa-solid fa-check"></i> Save</button>
        <button id="cancel-time" class="btn btn-secondary"><i class="fa-solid fa-times"></i> Cancel</button>
      </div>
    </div>
  </div>

<script src="./index.js"></script>
</body>
</html>
